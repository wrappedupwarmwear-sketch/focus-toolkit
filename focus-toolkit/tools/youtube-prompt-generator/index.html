<!DOCTYPE html>
<html>

<head>

<title>YouTube AI Prompt Generator</title>

<style>

body{
font-family:Arial;
background:#f4f6ff;
text-align:center;
padding:60px;
}

h1{
font-size:36px;
}

#prompt{
font-size:20px;
margin:40px;
background:white;
padding:20px;
border-radius:8px;
max-width:650px;
display:inline-block;
}

button{
padding:12px 20px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>YouTube AI Prompt Generator</h1>

<div id="prompt">
Click generate to get a YouTube prompt
</div>

<br>

<button onclick="generatePrompt()">Generate Prompt</button>

<script>

const prompts = [

"Generate 10 YouTube video ideas for a productivity channel.",

"Write a full YouTube video script explaining how AI works.",

"Create 10 catchy YouTube video titles about making money online.",

"Generate a YouTube thumbnail concept for a tech channel.",

"Write a YouTube intro script that hooks viewers in the first 10 seconds.",

"Generate 10 YouTube video ideas for a gaming channel.",

"Write a script for a motivational YouTube video.",

"Generate a content strategy for growing a YouTube channel.",

"Create 10 viral YouTube video ideas for a tech channel.",

"Write a YouTube outro encouraging viewers to subscribe."

];

function generatePrompt(){

let prompt = prompts[Math.floor(Math.random()*prompts.length)];

document.getElementById("prompt").innerText = prompt;

}

</script>

</body>

</html>
