<!DOCTYPE html>
<html>

<head>

<title>Dopamine Reward Wheel</title>

<style>

body{
font-family:Arial;
background:#1f2430;
color:white;
text-align:center;
padding:60px;
}

h1{
margin-bottom:40px;
}

#wheel{
width:300px;
height:300px;
border-radius:50%;
border:10px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
background:#4CAF50;
margin:auto;
transition:transform 1s ease;
}

button{
margin-top:40px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#2196F3;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎡 Dopamine Reward Wheel</h1>

<div id="wheel">Spin!</div>

<button onclick="spin()">Spin Wheel</button>

<script>

const rewards = [

"Take a 5 minute break",
"Watch a funny video",
"Grab a snack",
"Listen to your favourite song",
"Walk around the room",
"Stretch for 1 minute",
"Check social media",
"Drink some water"

];

function spin(){

const wheel = document.getElementById("wheel");

const reward = rewards[Math.floor(Math.random()*rewards.length)];

const spinAmount = Math.floor(Math.random()*360)+720;

wheel.style.transform = "rotate("+spinAmount+"deg)";

setTimeout(()=>{
wheel.innerText = reward;
},1000);

}

</script>

</body>

</html>
