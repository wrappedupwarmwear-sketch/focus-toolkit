<!DOCTYPE html>
<html>
<head>

<title>Ultimate Focus Toolkit</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
background:#1f2430;
color:white;
}

.header{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#1f2430,#2d3448);
}

.header h1{
font-size:42px;
margin-bottom:10px;
}

.search{
width:320px;
max-width:90%;
padding:12px;
border-radius:8px;
border:none;
margin-top:20px;
font-size:16px;
}

.tools{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.tool{
background:#2d3448;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.2s;
cursor:pointer;
}

.tool:hover{
transform:scale(1.05);
background:#39415a;
}

.tool a{
text-decoration:none;
color:white;
font-size:18px;
display:block;
}

</style>

</head>

<body>

<div class="header">

<h1>Ultimate Focus Toolkit</h1>
<p>ADHD Productivity Tools</p>

<input class="search" placeholder="Search tools..." onkeyup="searchTools(this.value)">

</div>

<div class="tools" id="tools">

<div class="tool">
<a href="tools/dopamine-wheel/index.html">🎡 Dopamine Wheel</a>
</div>

<div class="tool">
<a href="tools/adhd-dashboard/index.html">🧠 ADHD Dashboard</a>
</div>

<div class="tool">
<a href="tools/habit-tracker/index.html">📅 Habit Tracker</a>
</div>

<div class="tool">
<a href="tools/task-picker/index.html">🎲 Task Picker</a>
</div>

<div class="tool">
<a href="tools/password-generator/index.html">🔑 Password Generator</a>
</div>

<div class="tool">
<a href="tools/ai-promt-generator/index.html">🤖 AI Prompt Generator</a>
</div>

<div class="tool">
<a href="tools/coding-prompt-generator/index.html">💻 Coding Prompt Generator</a>
</div>

<div class="tool">
<a href="tools/business-prompt-generator/index.html">📈 Business Prompt Generator</a>
</div>

<div class="tool">
<a href="tools/writing-prompt-generator/index.html">✍️ Writing Prompt Generator</a>
</div>

<div class="tool">
<a href="tools/youtube-prompt-generator/index.html">📺 YouTube Prompt Generator</a>
</div>

</div>

<script>

function searchTools(input){

let filter=input.toLowerCase()
let tools=document.getElementsByClassName("tool")

for(let i=0;i<tools.length;i++){

let text=tools[i].innerText.toLowerCase()

if(text.includes(filter)){
tools[i].style.display="block"
}
else{
tools[i].style.display="none"
}

}

}

</script>

</body>
</html>
